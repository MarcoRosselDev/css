<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="utf-8">
    <title>Contact Form</title>
</head>
<body>
    <div class="form-container">
        <form>
            <h2>Contact Us</h2>
            <label for="name">
                Name: <input type="text" name="name" id="name" required value="name">
            </label>
            <label for="email">
                Email: <input type="email" name="email" id="email" required>
            </label>
            <label for="textarea">
                Message: <textarea name="textarea" id="textarea" placeholder="tell us something" required></textarea>
            </label>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
