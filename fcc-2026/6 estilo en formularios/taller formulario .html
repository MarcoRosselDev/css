<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>
    <form 
    method="POST"
    action="https://register-demo.freecodecamp.org">
    <fieldset>
        <label for="first-name">Enter Your First Name:
            <input
            name="first-name"
            required type="text" id="first-name" />
        </label>

        <label for="last-name">Enter Your Last Name: 
            <input
            name="last-name"
            required type="text" id="last-name" />
        </label>

        <label for="email">Enter Your Email: 
            <input
            name="email"
            required id="email" type="email" />
        </label>

        <label for="new-password">Create a New Password: 
            <input
            name="password"
            
            required 
            type="password" 
            id="new-password" 
            pattern="[a-z0-5]{8,}"
            />
        </label>
    </fieldset>
    <fieldset>
        <legend>Account type (required)</legend>
            <label for="personal-account"
            class="inline">
                <input
                name="account-type"
                type="radio" id="personal-account"
                value="personal"
                checked 
                class="inline"
                >
                Personal
            </label>
            <label for="business-account"
            class="inline">
                <input
                name="account-type"
                type="radio" id="business-account"
                value="business"
                class="inline"
                >
                Business
            </label>
    </fieldset>
    <fieldset>
        <label for="profile-picture">Upload a profile picture: 
            <input 
            type="file" 
            name="profile-picture" 
            id="profile-picture">
        </label>
        <label for="age">Input your age (years): 
            <input
            min="13"
            max="120"
            type="number" 
            name="age" 
            id="age">
        </label>
        <label for="referrer">How did you hear about us?
            <select name="referrer" id="referrer">
                <option value="">(select one)</option>
                <option value="1">freeCodeCamp News</option>
                <option value="2">freeCodeCamp YouTube Channel</option>
                <option value="3">freeCodeCamp Forum</option>
                <option value="4">Other</option>
            </select>
        </label>
        <label for="bio">Provide a bio:
            <textarea 
            rows="3"
            name="bio"
            cols="30"
            placeholder="I like coding on the beach..."
            id="bio">
            </textarea>
        </label>
    </fieldset>
    <a href="https://www.freecodecamp.org/news/terms-of-service/">Read our terms and conditions</a>
    <label for="terms-and-conditions">
        <input 
        type="checkbox" 
        required 
        name="terms-and-conditions"
        id="terms-and-conditions">
        I accept the terms and conditions
    </label>
    <input type="submit" value="Submit">
</form>

</body>
</html>
