<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="blog-post-card">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" 
    alt="user typing something on a laptop"
    class="post-img">
    <div class="post-content">
      <h2 class="post-title">Post title</h2>
      <p class="post-excerpt">text to summarize your blog post</p>
      <a 
      href="https://github.com/MarcoRosselDev" target="_blank"
      class="read-more">Read More</a>
    </div>
  </div>
</body>
</html>
