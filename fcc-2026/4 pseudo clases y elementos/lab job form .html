<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Job Application Form</title>
  </head>
  <body>
    <div class="container">
      <form>
        <h1>Job Application Form</h1>
        <label for="name">Full Name :</label>
        <input
          type="text"
          placeholder="Enter your name"
          name="name"
          required
          id="name"
        />
        <label for="email">Email :</label>
        <input
          type="email"
          name="email"
          required
          placeholder="Enter your email"
          id="email"
        />
        <label for="position">Position</label>
        <select name="position" required id="position">
          <option value="" default>Select a position</option>
          <option value="developer">Developer</option>
          <option value="designer">Designer</option>
          <option value="manager">Manager</option>
        </select>
        <fieldset class="radio-group">
          <legend>availability</legend>
          <input
            type="radio"
            default
            name="availability"
            checked
            id="full-time"
          />
          <label for="full-time">Full-time</label>
          <input type="radio" name="availability" id="part-time" />
          <label for="part-time">Part-time</label>
        </fieldset>
        <label for="message">Why do you want this job ?</label>
        <textarea
          rows="5"
          required
          placeholder="Write your motivation"
          name="message"
          id="message"
        ></textarea>

        <button type="submit">Submit Application</button>
      </form>
    </div>
  </body>
</html>
